<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demotivation | Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0022ff;
            --text-white: #ffffff;
            --accent-pink: #ff9de2;
            --shadow-light: rgba(255, 255, 255, 0.1);
            --shadow-dark: rgba(0, 0, 0, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header Styles */
        header {
            padding: 40px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
        }

        nav {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.9;
            transition: opacity 0.3s;
        }

        nav a:hover {
            opacity: 1;
        }

        /* Main Content */
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            padding: 0 10%;
        }

        .hero-text h2 {
            font-weight: 300;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .hero-text h1 {
            font-weight: 700;
            font-size: clamp(3rem, 8vw, 5rem);
            line-height: 1;
            text-transform: uppercase;
        }

        /* The Animated Clock */
        .clock-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .clock-face {
            width: 450px;
            height: 450px;
            background: var(--bg-color);
            border-radius: 50%;
            /* Neumorphic Inset Shadow */
            box-shadow: 
                inset 20px 20px 60px var(--shadow-dark), 
                inset -20px -20px 60px var(--shadow-light);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            transform-origin: bottom;
            border-radius: 10px;
            transition: transform 0.5s cubic-bezier(0.4, 2.08, 0.55, 0.44);
        }

        .hour-hand {
            width: 8px;
            height: 120px;
            background: white;
            z-index: 2;
        }

        .minute-hand {
            width: 8px;
            height: 160px;
            background: var(--accent-pink);
            z-index: 1;
        }

        /* Center Dot */
        .clock-face::after {
            content: '';
            width: 15px;
            height: 15px;
            background: white;
            border-radius: 50%;
            z-index: 5;
        }

        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 50px;
            }
            .clock-face {
                width: 300px;
                height: 300px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Demotivation</div>
        <nav>
            <a href="#">About</a>
            <a href="#">𝕏</a>
            <a href="#">in</a>
            <a href="#">f</a>
        </nav>
    </header>

    <main>
        <div class="hero-text">
            <h2>Our New Site Is</h2>
            <h1>Coming<br>Soon</h1>
        </div>

        <div class="clock-container">
            <div class="clock-face">
                <div class="hand hour-hand" id="hour"></div>
                <div class="hand minute-hand" id="minute"></div>
            </div>
        </div>
    </main>

    <script>
        function updateClock() {
            const now = new Date();
            const seconds = now.getSeconds();
            const minutes = now.getMinutes();
            const hours = now.getHours();

            // Calculate rotations
            const minsDegrees = ((minutes / 60) * 360) + ((seconds/60)*6) + 90;
            const hourDegrees = ((hours / 12) * 360) + ((minutes/60)*30) + 90;

            // Offset by 180 because the hands start at bottom:50% (pointing up)
            document.getElementById('minute').style.transform = `rotate(${minsDegrees}deg)`;
            document.getElementById('hour').style.transform = `rotate(${hourDegrees}deg)`;
        }

        // Run every second
        setInterval(updateClock, 1000);
        updateClock(); // Initial call
    </script>
</body>
</html>
