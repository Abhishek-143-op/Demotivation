<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demotivation | Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-color: #0022ff;
        --text-white: #ffffff;
        --accent-pink: #ff9de2;
        --shadow-light: rgba(255, 255, 255, 0.1);
        --shadow-dark: rgba(0, 0, 0, 0.2);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-white);
        min-height: 100vh;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
      }

      /* Header Styles */
      header {
        padding: 40px 60px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 10;
      }

      .logo {
        font-weight: 700;
        font-size: 1.5rem;
        letter-spacing: -0.5px;
      }

      nav {
        display: flex;
        gap: 30px;
        align-items: center;
      }

      nav a {
        color: white;
        text-decoration: none;
        font-size: 0.9rem;
        opacity: 0.9;
        transition: opacity 0.3s;
      }

      nav a:hover {
        opacity: 1;
      }

      @media (max-width: 768px) {
        header {
          padding: 20px 30px;
          flex-direction: column;
          gap: 20px;
          text-align: center;
        }

        nav {
          gap: 15px;
          font-size: 0.8rem;
        }
      }

      /* Main Content */
      main {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        align-items: center;
        justify-items: center;
        padding: 40px 10% 60px 10%;
        gap: 60px;
      }

      /* Quote Container - Left side */
      .quote-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-items: center;
        gap: 30px;
      }

      .meme-image {
        width: 100%;
        max-width: 350px;
        height: 350px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 15px;
        border: 2px solid var(--accent-pink);
        object-fit: cover;
        box-shadow:
          0 20px 60px rgba(0, 0, 0, 0.3),
          0 0 40px rgba(255, 157, 226, 0.2);
      }

      .meme-quote {
        font-weight: 700;
        font-size: clamp(1.3rem, 3vw, 2rem);
        line-height: 1.4;
        text-transform: uppercase;
        color: var(--accent-pink);
        text-align: center;
        max-width: 350px;
      }

      /* The Animated Clock */
      .clock-container {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .clock-face {
        width: 450px;
        height: 450px;
        background: var(--bg-color);
        border-radius: 50%;
        /* Neumorphic Inset Shadow */
        box-shadow:
          inset 20px 20px 60px var(--shadow-dark),
          inset -20px -20px 60px var(--shadow-light);
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .hand {
        position: absolute;
        bottom: 50%;
        transform-origin: bottom;
        border-radius: 10px;
        transition: transform 0.5s cubic-bezier(0.4, 2.08, 0.55, 0.44);
      }

      .hour-hand {
        width: 8px;
        height: 120px;
        background: white;
        z-index: 2;
      }

      .minute-hand {
        width: 8px;
        height: 160px;
        background: var(--accent-pink);
        z-index: 1;
      }

      /* Center Dot */
      .clock-face::after {
        content: "";
        width: 15px;
        height: 15px;
        background: white;
        border-radius: 50%;
        z-index: 5;
      }

      @media (max-width: 900px) {
        main {
          grid-template-columns: 1fr;
          text-align: center;
          justify-items: center;
          padding: 30px 20px 60px 20px;
          gap: 40px;
        }

        .meme-image {
          max-width: 250px;
          height: 250px;
        }

        .clock-face {
          width: 300px;
          height: 300px;
        }

        .hour-hand {
          height: 90px;
        }

        .minute-hand {
          height: 120px;
        }
      }

      @media (max-width: 768px) {
        main {
          padding: 20px 15px 60px 15px;
          gap: 30px;
        }

        .meme-image {
          max-width: 200px;
          height: 200px;
        }

        .meme-quote {
          font-size: 1rem;
          max-width: 280px;
        }

        .clock-face {
          width: 250px;
          height: 250px;
        }

        .hour-hand {
          height: 75px;
        }

        .minute-hand {
          height: 100px;
        }

        .clock-face::after {
          width: 12px;
          height: 12px;
        }
      }

      @media (max-width: 480px) {
        main {
          padding: 15px 10px 40px 10px;
          gap: 20px;
        }

        .meme-image {
          max-width: 150px;
          height: 150px;
        }

        .meme-quote {
          font-size: 0.9rem;
          max-width: 200px;
        }

        .clock-face {
          width: 200px;
          height: 200px;
        }

        .hour-hand {
          width: 6px;
          height: 60px;
        }

        .minute-hand {
          width: 6px;
          height: 80px;
        }
      }

      /* Footer Styles */
      footer {
        background: rgba(0, 0, 0, 0.3);
        padding: 80px 60px;
        margin-top: 100px;
        border-top: 2px solid var(--accent-pink);
      }

      .footer-content {
        max-width: 1200px;
        margin: 0 auto;
      }

      .footer-title {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 60px;
        text-align: center;
      }

      .creators-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 60px;
      }

      .creator-card {
        display: flex;
        flex-direction: column;
        gap: 20px;
        padding: 40px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--accent-pink);
        border-radius: 15px;
        transition: all 0.3s;
      }

      .creator-card:hover {
        background: rgba(255, 255, 255, 0.1);
        box-shadow: 0 0 30px rgba(255, 157, 226, 0.3);
      }

      .creator-name {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--accent-pink);
      }

      .social-links {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
      }

      .social-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        background: rgba(255, 157, 226, 0.1);
        border: 1px solid var(--accent-pink);
        color: var(--accent-pink);
        font-size: 1.2rem;
        text-decoration: none;
        transition: all 0.3s;
      }

      .social-link:hover {
        background: var(--accent-pink);
        color: var(--bg-color);
        transform: scale(1.1);
      }

      @media (max-width: 900px) {
        footer {
          padding: 60px 30px;
          margin-top: 60px;
        }

        .footer-title {
          font-size: 1.5rem;
          margin-bottom: 40px;
        }

        .creators-grid {
          grid-template-columns: 1fr;
          gap: 30px;
        }

        .creator-card {
          padding: 30px;
        }
      }

      @media (max-width: 768px) {
        footer {
          padding: 40px 20px;
          margin-top: 40px;
        }

        .footer-title {
          font-size: 1.3rem;
          margin-bottom: 30px;
        }

        .creators-grid {
          gap: 20px;
        }

        .creator-card {
          padding: 20px;
        }

        .creator-name {
          font-size: 1.2rem;
        }
      }

      @media (max-width: 480px) {
        footer {
          padding: 30px 15px;
          margin-top: 30px;
        }

        .footer-title {
          font-size: 1.1rem;
          margin-bottom: 20px;
        }

        .creators-grid {
          gap: 15px;
        }

        .creator-card {
          padding: 15px;
        }

        .creator-name {
          font-size: 1rem;
        }

        .social-link {
          width: 40px;
          height: 40px;
          font-size: 1rem;
        }
      }
    </style>

    <main>
      <div class="quote-container">
        <img id="memeImage" class="meme-image" alt="Demotivation Meme" />
        <div id="quoteText" class="meme-quote"></div>
      </div>

      <div class="clock-container">
        <div class="clock-face">
          <div class="hand hour-hand" id="hour"></div>
          <div class="hand minute-hand" id="minute"></div>
        </div>
      </div>
    </main>

    <script>
      // Array of demotivation quotes with meme images
      const quotesMemes = [
        {
          quote: "Motivation is when\nyour dreams put on\na work uniform",
          image:
            "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTkiR2TkaG04efqiIGBjIfWEXudrXlKBoHKkw&s",
        },

      ];

      // Display random quote and meme on page load
      function displayRandomQuote() {
        const randomIndex = Math.floor(Math.random() * quotesMemes.length);
        const { quote, image } = quotesMemes[randomIndex];

        document.getElementById("quoteText").textContent = quote;
        document.getElementById("memeImage").src = image;
      }

      // Update clock every second
      function updateClock() {
        const now = new Date();
        const seconds = now.getSeconds();
        const minutes = now.getMinutes();
        const hours = now.getHours();

        // Calculate rotations
        const minsDegrees = (minutes / 60) * 360 + (seconds / 60) * 6 + 90;
        const hourDegrees = (hours / 12) * 360 + (minutes / 60) * 30 + 90;

        // Offset by 180 because the hands start at bottom:50% (pointing up)
        document.getElementById("minute").style.transform =
          `rotate(${minsDegrees}deg)`;
        document.getElementById("hour").style.transform =
          `rotate(${hourDegrees}deg)`;
      }

      // Initialize
      displayRandomQuote();
      updateClock();

      // Run clock update every second
      setInterval(updateClock, 1000);
    </script>
